#Application
spring.application.name=backend

#Server
server.port=8080
server.servlet.context-path=/
spring.web.resources.static-locations=classpath:/static/

#SQL
spring.datasource.url=jdbc:mysql://localhost:3306/ucaacp?useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456

#Redits
#spring.data.redis.host=127.0.0.1
#spring.data.redis.port=6379

#Logging
logging.level.root=INFO
logging.level.com.lihaozhe=DEBUG

#captcha
captcha.enable=true

#avatar upload
app.avatar.upload-dir=backend/static/uploads/avatar
app.avatar.url-prefix=/uploads/avatar/

# appointment overdue scan
app.appointment.overdue-hours=24
app.appointment.overdue-scan-initial-ms=30000
app.appointment.overdue-scan-interval-ms=300000

# AI assistant
ai.assistant.enabled=true
ai.assistant.provider-enabled=${AI_ASSISTANT_PROVIDER_ENABLED:true}
ai.assistant.provider-base-url=${AI_ASSISTANT_PROVIDER_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
ai.assistant.api-key=${AI_ASSISTANT_API_KEY:${DASHSCOPE_API_KEY:${OPENAI_API_KEY:}}}
ai.assistant.model=${AI_ASSISTANT_MODEL:qwen3.5-plus}
ai.assistant.temperature=${AI_ASSISTANT_TEMPERATURE:0.6}
ai.assistant.max-history-messages=16
ai.assistant.max-response-chars=1200
ai.assistant.stream-delay-ms=20
ai.assistant.rag-top-k=3
ai.assistant.crisis-hotlines[0]=110 公安报警电话
ai.assistant.crisis-hotlines[1]=120 医疗急救电话
ai.assistant.crisis-hotlines[2]=请联系本校心理中心值班电话

